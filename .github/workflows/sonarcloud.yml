name: SonarCloud Analysis

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6am UTC
  workflow_dispatch: # Manual trigger

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build Wasm
        run: deno task build:wasm

      - name: Run tests with coverage
        run: deno test --allow-read --allow-write --allow-env --coverage=coverage tests/

      - name: Generate coverage report
        run: |
          deno coverage coverage --lcov --output=coverage.lcov
          sed -i 's|SF:/home/.*/TagLib-Wasm/|SF:|g' coverage.lcov || true
          mkdir -p coverage
          mv coverage.lcov coverage/lcov.info

      - name: Generate test execution report
        run: |
          ./scripts/generate-sonar-test-report.ts || echo "Failed to generate test report"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.testExecutionReportPaths=test-results-sonar.xml
